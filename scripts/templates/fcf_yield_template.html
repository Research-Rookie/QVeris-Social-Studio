<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FCF Yield Comparison</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 1200px;
      height: 675px;
      padding: 38px 44px;
      color: #f7f9fc;
      background:
        radial-gradient(circle at 18% 18%, rgba(79, 163, 255, 0.2), transparent 28%),
        radial-gradient(circle at 84% 76%, rgba(255, 90, 79, 0.16), transparent 30%),
        linear-gradient(135deg, #171922 0%, #24242e 52%, #171922 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.85), rgba(0,0,0,0.18));
      pointer-events: none;
    }

    .shell {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      gap: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
    }

    .eyebrow {
      color: #7ed7ff;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.16em;
    }

    .title {
      margin-top: 8px;
      font-size: 45px;
      font-weight: 850;
      letter-spacing: -0.045em;
    }

    .subtitle {
      margin-top: 10px;
      color: rgba(247, 249, 252, 0.68);
      font-size: 18px;
      font-weight: 600;
    }

    .date {
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      color: rgba(247, 249, 252, 0.78);
      background: rgba(255, 255, 255, 0.05);
      font-size: 14px;
      font-weight: 700;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .metric {
      padding: 18px 20px;
      border: 1px solid rgba(255, 255, 255, 0.11);
      border-left: 4px solid var(--accent);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.22);
    }

    .metric-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .ticker {
      font-size: 24px;
      font-weight: 850;
    }

    .yield {
      color: var(--accent);
      font-size: 34px;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .name {
      margin-top: 3px;
      color: rgba(247, 249, 252, 0.82);
      font-size: 15px;
      font-weight: 700;
    }

    .sub {
      margin-top: 8px;
      color: rgba(247, 249, 252, 0.56);
      font-size: 13px;
      font-weight: 650;
    }

    .chart-wrap {
      flex: 1;
      padding: 18px 20px 12px;
      border: 1px solid rgba(255, 255, 255, 0.11);
      border-radius: 22px;
      background: rgba(12, 13, 20, 0.62);
    }

    .chart {
      display: block;
      width: 100%;
      height: 315px;
    }

    .grid line {
      stroke: rgba(255, 255, 255, 0.08);
      stroke-width: 1;
    }

    .grid text,
    .date-label {
      fill: rgba(247, 249, 252, 0.46);
      font-size: 12px;
      font-weight: 700;
    }

    .date-label {
      text-anchor: middle;
    }

    .axis {
      stroke: rgba(255, 255, 255, 0.2);
      stroke-width: 1.2;
    }

    .lines path {
      fill: none;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.35));
    }

    .end-label {
      font-size: 14px;
      font-weight: 850;
      paint-order: stroke;
      stroke: #171922;
      stroke-width: 4px;
    }

    .legend {
      display: flex;
      gap: 18px;
      margin-left: 58px;
      color: rgba(247, 249, 252, 0.72);
      font-size: 13px;
      font-weight: 750;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .legend i {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .watermark {
      position: absolute;
      right: 44px;
      bottom: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(247, 249, 252, 0.86);
      font-size: 24px;
      font-weight: 850;
    }

    .watermark img {
      width: 32px;
      height: 32px;
      object-fit: contain;
    }
  </style>
</head>

<body>
  <main class="shell">
    <section class="header">
      <div>
        <div class="eyebrow">VALUATION COMPARISON</div>
        <h1 class="title">{{TITLE}}</h1>
        <p class="subtitle">{{SUBTITLE}}</p>
      </div>
      <div class="date">{{DATE}}</div>
    </section>

    <section class="metrics">
      {{METRICS}}
    </section>

    <section class="chart-wrap">
      {{CHART}}
    </section>
  </main>

  <div class="watermark">
    <img src="{{LOGO}}" alt="QVeris" />
    <span>QVeris</span>
  </div>
</body>
</html>
