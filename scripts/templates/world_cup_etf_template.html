<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 1200px;
        height: 675px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 18% 18%, rgba(96, 165, 250, 0.24), transparent 28%),
          radial-gradient(circle at 86% 20%, rgba(45, 212, 191, 0.22), transparent 26%),
          linear-gradient(135deg, #0b1020 0%, #111827 46%, #172033 100%);
        color: #f8fafc;
      }

      .frame {
        position: relative;
        width: 100%;
        height: 100%;
        padding: 52px 64px 44px;
        overflow: hidden;
      }

      .grid {
        position: absolute;
        inset: 0;
        opacity: 0.16;
        background-image:
          linear-gradient(rgba(148, 163, 184, 0.22) 1px, transparent 1px),
          linear-gradient(90deg, rgba(148, 163, 184, 0.22) 1px, transparent 1px);
        background-size: 48px 48px;
      }

      .topline,
      .footer {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        z-index: 1;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        color: #cbd5e1;
        font-size: 24px;
        font-weight: 700;
      }

      .brand img {
        width: 44px;
        height: 44px;
        border-radius: 12px;
      }

      .pill {
        border: 1px solid rgba(125, 211, 252, 0.35);
        border-radius: 999px;
        padding: 10px 16px;
        color: #bfdbfe;
        background: rgba(15, 23, 42, 0.55);
        font-size: 20px;
        letter-spacing: 0.02em;
      }

      .headline {
        position: relative;
        z-index: 1;
        margin-top: 46px;
        text-align: center;
      }

      .kicker {
        color: #67e8f9;
        font-size: 24px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 14px auto 0;
        max-width: 980px;
        font-size: 54px;
        line-height: 1.08;
        letter-spacing: -0.04em;
      }

      .result-text {
        margin-top: 16px;
        color: #cbd5e1;
        font-size: 25px;
        font-weight: 650;
      }

      .cards {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: 1fr 132px 1fr;
        gap: 24px;
        align-items: stretch;
        margin-top: 44px;
      }

      .team-card {
        min-height: 250px;
        border: 1px solid rgba(148, 163, 184, 0.24);
        border-radius: 32px;
        padding: 30px;
        background: rgba(15, 23, 42, 0.72);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }

      .team-name {
        color: #f8fafc;
        font-size: 32px;
        font-weight: 850;
        letter-spacing: -0.03em;
      }

      .score {
        margin-top: 10px;
        color: #93c5fd;
        font-size: 62px;
        font-weight: 900;
        line-height: 1;
      }

      .etf {
        margin-top: 20px;
        color: #facc15;
        font-size: 34px;
        font-weight: 900;
      }

      .etf-name {
        margin-top: 5px;
        min-height: 24px;
        color: #94a3b8;
        font-size: 19px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .price {
        margin-top: 22px;
        color: #e2e8f0;
        font-size: 24px;
        font-weight: 700;
      }

      .move {
        margin-top: 4px;
        font-size: 31px;
        font-weight: 900;
      }

      .up {
        color: #34d399;
      }

      .down {
        color: #fb7185;
      }

      .bar-wrap {
        margin-top: 18px;
        width: 100%;
        height: 13px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.18);
        overflow: hidden;
      }

      .bar {
        height: 100%;
        border-radius: 999px;
      }

      .bar-up {
        background: linear-gradient(90deg, #2dd4bf, #34d399);
      }

      .bar-down {
        background: linear-gradient(90deg, #f97316, #fb7185);
      }

      .vs {
        display: grid;
        place-items: center;
        color: rgba(226, 232, 240, 0.75);
        font-size: 34px;
        font-weight: 900;
        letter-spacing: 0.08em;
      }

      .vs span {
        display: grid;
        place-items: center;
        width: 106px;
        height: 106px;
        border: 1px solid rgba(125, 211, 252, 0.3);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.72);
        box-shadow: inset 0 0 30px rgba(45, 212, 191, 0.16);
      }

      .footer {
        margin-top: 32px;
        color: #94a3b8;
        font-size: 19px;
      }

      .qveris {
        color: #e0f2fe;
        font-weight: 850;
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <div class="grid"></div>
      <div class="topline">
        <div class="brand">
          <img src="{{LOGO}}" alt="QVeris" />
          <span>QVeris Social Studio</span>
        </div>
        <div class="pill">{{DATE}}</div>
      </div>

      <section class="headline">
        <div class="kicker">{{EVENT}} ETF Watch</div>
        <h1>{{MATCH}}</h1>
        <div class="result-text">{{RESULT_TEXT}}</div>
      </section>

      <section class="cards">
        {{HOME_CARD}}
        <div class="vs"><span>VS</span></div>
        {{AWAY_CARD}}
      </section>

      <div class="footer">
        <div>Football result from football-data.org. ETF quote source: {{SOURCE}}.</div>
        <div class="qveris">Built with QVeris</div>
      </div>
    </main>
  </body>
</html>
