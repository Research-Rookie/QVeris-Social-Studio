<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOP5 US Stocks</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 1200px;
      height: 675px;
      background:
        radial-gradient(circle at 18% 20%, rgba(45, 106, 255, 0.38), transparent 28%),
        radial-gradient(circle at 82% 75%, rgba(126, 58, 242, 0.42), transparent 34%),
        linear-gradient(135deg, #06113f 0%, #080d32 45%, #190b46 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.06) 45%, transparent 70%);
      pointer-events: none;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
      z-index: 1;
    }

    .title {
      font-size: 48px;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 8px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.35);
    }

    .date {
      font-size: 20px;
      color: rgba(255,255,255,0.82);
      font-weight: 600;
    }

    .container {
      background: rgba(255,255,255,0.96);
      border-radius: 22px;
      padding: 32px;
      box-shadow: 0 24px 70px rgba(0,0,0,0.35);
      width: 100%;
      max-width: 900px;
      z-index: 1;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    .row:last-child {
      border-bottom: none;
    }

    .row.first {
      background: linear-gradient(90deg, rgba(255,215,0,0.16), rgba(255,215,0,0.04));
      border: 1px solid rgba(255,190,0,0.65);
      border-radius: 14px;
      margin-bottom: 8px;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .rank {
      font-size: 28px;
      font-weight: 800;
      color: #4f46e5;
      min-width: 50px;
    }

    .row.first .rank {
      color: #f59e0b;
    }

    .symbol {
      font-size: 32px;
      font-weight: 800;
      color: #071033;
    }

    .right {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .price {
      font-size: 28px;
      font-weight: 700;
      color: #111827;
      min-width: 120px;
      text-align: right;
    }

    .pct {
      font-size: 26px;
      font-weight: 800;
      padding: 8px 16px;
      border-radius: 10px;
      min-width: 130px;
      text-align: center;
    }

    .pct.up {
      background: rgba(34,197,94,0.16);
      color: #15803d;
    }

    .pct.down {
      background: rgba(239,68,68,0.16);
      color: #dc2626;
    }

    .watermark {
      position: absolute;
      bottom: 24px;
      right: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0.95;
      z-index: 2;
    }

    .logo-img {
      width: 38px;
      height: 38px;
      object-fit: contain;
    }

    .logo-text {
      font-size: 28px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: 1px;
      text-shadow: 0 2px 6px rgba(0,0,0,0.35);
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="title">TOP 5 U.S. STOCK MOVERS</div>
    <div class="date">{{DATE}}</div>
  </div>

  <div class="container">
    {{ROWS}}
  </div>

  <div class="watermark">
    <img src="{{LOGO}}" alt="QVeris Logo" class="logo-img" />
    <span class="logo-text">QVeris</span>
  </div>
</body>
</html>
