name: Publish Selected Card to X

on:
  workflow_dispatch:
    inputs:
      post_id:
        description: "Exact post id from the website card"
        required: true
      dry_run:
        description: "Preview only; set false to publish"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: qveris-publish-to-x
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install tweepy

      - name: Publish selected card
        env:
          X_AUTO_POST: ${{ github.event.inputs.dry_run == 'false' && 'true' || 'false' }}
          X_POST_ID: ${{ github.event.inputs.post_id }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: python scripts/post_pending_to_x.py

      - name: Commit publish status
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          git config user.name "qveris-content-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/posts.json
          if git diff --cached --quiet; then
            echo "No publish status changes to commit."
            exit 0
          fi

          git commit -m "chore: mark x post published ${{ github.event.inputs.post_id }}"

          for attempt in 1 2 3; do
            git pull --rebase origin master
            if git push origin master; then
              exit 0
            fi
            echo "Push failed on attempt ${attempt}; retrying after remote rebase."
            sleep 3
          done

          echo "Could not push publish status after 3 attempts."
          exit 1
