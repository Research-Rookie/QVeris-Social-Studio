name: Send Selected Card to Typefully

on:
  workflow_dispatch:
    inputs:
      post_id:
        description: "Exact post id from the website card"
        required: true
      social_set_id:
        description: "Optional Typefully social set id; overrides TYPEFULLY_SOCIAL_SET_ID secret"
        required: false
      dry_run:
        description: "Preview only; set false to create the Typefully draft"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: qveris-send-to-typefully
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install requests

      - name: Send selected card to Typefully
        env:
          TYPEFULLY_CREATE_DRAFT: ${{ github.event.inputs.dry_run == 'false' && 'true' || 'false' }}
          TYPEFULLY_POST_ID: ${{ github.event.inputs.post_id }}
          TYPEFULLY_SOCIAL_SET_ID_INPUT: ${{ github.event.inputs.social_set_id }}
          TYPEFULLY_API_KEY: ${{ secrets.TYPEFULLY_API_KEY }}
          TYPEFULLY_SOCIAL_SET_ID: ${{ secrets.TYPEFULLY_SOCIAL_SET_ID }}
        run: python scripts/send_to_typefully.py

      - name: Commit Typefully draft status
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          git config user.name "qveris-content-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/posts.json
          if git diff --cached --quiet; then
            echo "No Typefully status changes to commit."
            exit 0
          fi

          git commit -m "chore: mark typefully draft ${{ github.event.inputs.post_id }}"

          for attempt in 1 2 3; do
            git pull --rebase origin master
            if git push origin master; then
              exit 0
            fi
            echo "Push failed on attempt ${attempt}; retrying after remote rebase."
            sleep 3
          done

          echo "Could not push Typefully status after 3 attempts."
          exit 1
