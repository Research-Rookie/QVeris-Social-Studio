name: QVeris World Cup Finance Signals

on:
  schedule:
    # Daily 09:15 Asia/Shanghai during the tournament window.
    - cron: "15 1 * * *"
  workflow_dispatch:

concurrency:
  group: qveris-world-cup-finance
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Fetch World Cup finance signals
        env:
          QVERIS_API_KEY: ${{ secrets.QVERIS_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          FOOTBALL_API_BASE_URL: https://api.football-data.org
          FOOTBALL_COMPETITION: WC
        run: python scripts/fetch_world_cup_finance.py

      - name: Generate World Cup finance image
        run: python scripts/generate_world_cup_finance_image.py

      - name: Generate World Cup finance tweet and archive card
        env:
          WEBSITE_URL: https://qveris.ai
        run: python scripts/generate_world_cup_finance_tweet.py

      - name: Commit archive
        run: |
          git config user.name "qveris-content-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/posts.json data/world_cup_finance_tweet_preview.txt
          git add images/world_cup_etf_*.png public/posts/world_cup_etf_*.png 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No World Cup finance archive changes to commit."
            exit 0
          fi

          git commit -m "chore: archive world cup finance card $(date -u +%Y-%m-%d)"

          for attempt in 1 2 3; do
            git pull --rebase origin master
            if git push origin master; then
              exit 0
            fi
            echo "Push failed on attempt ${attempt}; retrying after remote rebase."
            sleep 3
          done

          echo "Could not push archive after 3 attempts."
          exit 1
